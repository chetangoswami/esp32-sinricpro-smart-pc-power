name: Bug Report
description: Create a report to help us improve the ESP32 Smart PC Controller
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: hardware
    attributes:
      label: Hardware Setup
      description: What specific ESP32 and Relay are you using? How is it wired?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant logs from the PlatformIO Serial Monitor here.
      render: shell
  - type: checkboxes
    id: verified
    attributes:
      label: Troubleshooting Checklist
      options:
        - label: I am using a safe pin (NOT D5)
          required: true
        - label: I am powering the 5V relay from VIN, not 3V3
          required: true
        - label: I have verified my Windows Firewall ICMP rules
          required: false
